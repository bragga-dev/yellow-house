<!-- Modal: Atualizar Artwork -->
<div class="modal fade" id="updateArtworkModal{{ artwork.id }}" tabindex="-1" aria-labelledby="updateArtworkModalLabel{{ artwork.id }}" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content rounded-4 shadow-sm border-0">
      <div class="modal-header bg-light border-bottom-0">
        <h5 class="modal-title d-flex align-items-center" id="updateArtworkModalLabel{{ artwork.id }}">
          <i class="bi bi-pencil-square text-warning me-2"></i> Atualizar Obra: {{ artwork.name }}
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>

      <form method="POST" action="{% url 'vitrine:update_artwork' slug=artwork.slug artwork_id=artwork.id %}" enctype="multipart/form-data" novalidate class="px-4 pb-3">
        {% csrf_token %}
        <div class="modal-body px-0">
          {% if artwork.edit_form.non_field_errors %}
            <div class="alert alert-danger rounded-3 py-2 px-3">
              {{ artwork.edit_form.non_field_errors }}
            </div>
          {% endif %}

          <div class="row g-3">
            <!-- Nome -->
            <div class="col-md-6">
              <label for="name_{{ artwork.id }}" class="form-label fw-semibold text-dark">Nome da Obra</label>
              <input type="text" name="name" id="name_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.name.value }}">
            </div>

            <!-- Categoria -->
            <div class="col-md-6">
              <label for="category_{{ artwork.id }}" class="form-label fw-semibold text-dark">Categoria</label>
              <select name="art_work_category" id="category_{{ artwork.id }}" class="form-control border-1 rounded-2">
                {% for category in artwork.edit_form.fields.art_work_category.queryset %}
                  <option value="{{ category.pk }}" {% if artwork.edit_form.art_work_category.value|stringformat:"s" == category.pk|stringformat:"s" %}selected{% endif %}>
                    {{ category.name }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <!-- Preço -->
            <div class="col-md-4">
              <label for="price_{{ artwork.id }}" class="form-label fw-semibold text-dark">Preço (R$)</label>
              <input type="number" step="0.01" name="price" id="price_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.price.value }}">
            </div>

            <!-- Estoque -->
            <div class="col-md-4">
              <label for="stock_{{ artwork.id }}" class="form-label fw-semibold text-dark">Estoque</label>
              <input type="number" name="stock" id="stock_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.stock.value }}">
            </div>

            <!-- Dimensões -->
            <div class="col-md-2">
              <label for="width_{{ artwork.id }}" class="form-label fw-semibold text-dark">Largura (cm)</label>
              <input type="number" step="0.01" name="width" id="width_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.width.value }}">
            </div>
            <div class="col-md-2">
              <label for="height_{{ artwork.id }}" class="form-label fw-semibold text-dark">Altura (cm)</label>
              <input type="number" step="0.01" name="height" id="height_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.height.value }}">
            </div>

            <!-- Técnica -->
            <div class="col-md-4">
              <label for="technique_{{ artwork.id }}" class="form-label fw-semibold text-dark">Técnica</label>
              <input type="text" name="technique" id="technique_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.technique.value }}">
            </div>

           <!-- Ano -->
            <div class="col-md-4">
            <label for="year_created_{{ artwork.id }}" class="form-label fw-semibold text-dark">Ano de Criação</label>
            <input type="date" name="year_created" id="year_created_{{ artwork.id }}" class="form-control border-1 rounded-2" 
                    value="{{ artwork.edit_form.instance.year_created|date:'Y-m-d' }}">
            </div>


            <!-- Estilo -->
            <div class="col-md-4">
              <label for="style_{{ artwork.id }}" class="form-label fw-semibold text-dark">Estilo</label>
              <input type="text" name="style" id="style_{{ artwork.id }}" class="form-control border-1 rounded-2" value="{{ artwork.edit_form.style.value }}">
            </div>

            <!-- Descrição -->
            <div class="col-12">
              <label for="description_{{ artwork.id }}" class="form-label fw-semibold text-dark">Descrição</label>
              <textarea name="description" id="description_{{ artwork.id }}" rows="3" class="form-control border-1 rounded-2">{{ artwork.edit_form.description.value }}</textarea>
            </div>

            <!-- Imagens -->
            <div class="col-12">
              <label for="images_{{ artwork.id }}" class="form-label fw-semibold text-dark">Imagens</label>
              <input type="file" name="images" id="images_{{ artwork.id }}" class="form-control border-1 rounded-2" multiple accept="image/*">
              <div id="previewContainer{{ artwork.id }}" class="mt-3 row g-3">
                {% for img in artwork.images.all %}
                  <div class="col-md-4">
                    <div class="card shadow-sm">
                      <img src="{{ img.image.url }}" class="card-img-top" alt="Imagem atual">
                      <div class="card-body">
                        <div class="form-check">
                          <input class="form-check-input" type="radio" name="is_primary" value="{{ forloop.counter0 }}" id="primary{{ artwork.id }}_{{ forloop.counter0 }}" {% if img.is_primary %}checked{% endif %}>
                          <label class="form-check-label" for="primary{{ artwork.id }}_{{ forloop.counter0 }}">
                            Principal
                          </label>
                        </div>
                      </div>
                    </div>
                  </div>
                {% endfor %}
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer border-top-0 pt-3">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-warning">
            <i class="bi bi-save-fill me-1"></i> Atualizar Obra
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
document.querySelectorAll('input[type="file"][id^="images_"]').forEach(input => {
  input.addEventListener('change', function(event) {
    const artworkId = this.id.split('_')[1];
    const container = document.getElementById('previewContainer' + artworkId);
    container.innerHTML = '';

    const files = event.target.files;
    Array.from(files).forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const col = document.createElement('div');
        col.className = 'col-md-4';
        col.innerHTML = `
          <div class="card shadow-sm">
            <img src="${e.target.result}" class="card-img-top" alt="Prévia da imagem">
            <div class="card-body">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="is_primary" value="${index}" id="newPrimary${artworkId}_${index}">
                <label class="form-check-label" for="newPrimary${artworkId}_${index}">Principal</label>
              </div>
            </div>
          </div>
        `;
        container.appendChild(col);
      };
      reader.readAsDataURL(file);
    });
  });
});
</script>
