version: '3.9'

services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-client:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123};
      mc mb local/${MINIO_BUCKET:-media} || true;
      mc anonymous set public local/${MINIO_BUCKET:-media};
      "
    depends_on:
      - minio

  web:
    build: 
      context: .
      args:
        DJANGO_ENV: prod
    restart: always
    command: gunicorn casa_amarela.wsgi:application --bind 0.0.0.0:8000 --workers=3
    volumes:
      - static_volume:/vol/static
      - media_volume:/vol/media
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
      - minio

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/vol/static
      - media_volume:/vol/media
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_volume:
  media_volume:



# Rodar isso no terminal = docker compose -f docker-compose.prod.yml up -d --build