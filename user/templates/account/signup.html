{% extends "vitrine/base.html" %}
{% load i18n %}
{% block content %}
<section id="signup-choose" class="my-5">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-md-10 col-lg-8 col-xl-6">
        <div class="card shadow rounded-4">
          <div class="card-body p-5">

            <h2 class="mb-4">{% trans "Como você deseja se cadastrar?" %}</h2>

            <p class="lead mb-4">{% trans "Escolha o tipo de conta que deseja criar:" %}</p>

            <div class="d-grid gap-3">
              <a href="{% url 'shared:account_signup_client' %}" class="btn btn-outline-primary btn-lg">
                {% trans "Sou Cliente" %}
              </a>
              <a href="{% url 'shared:account_signup_artist' %}" class="btn btn-outline-secondary btn-lg">
                {% trans "Sou Artista" %}
              </a>
            </div>

            <p class="mt-4">
              {% trans "Já possui uma conta?" %}
              <a href="{% url 'account_login' %}">{% trans "Entrar" %}</a>
            </p>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
