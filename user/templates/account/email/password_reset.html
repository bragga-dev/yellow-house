{% extends "vitrine/base.html" %}
{% block content %}
  <div class="password-reset-container">
    <h2>Redefinição de senha</h2>
    <p>Esqueceu sua senha? Digite seu e-mail abaixo e enviaremos um link para redefinir:</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Enviar link</button>
    </form>
  </div>
{% endblock %}
